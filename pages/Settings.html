   <script>
// ------------------------------------------------------------
// ۲. تغییر زبان (با اعمال جهت صفحه)
// 2. Change language (with page direction handling)
// ------------------------------------------------------------
function changeLanguage(lang) {

    // ذخیره زبان انتخاب‌شده در localStorage
    // Save selected language in localStorage
    localStorage.setItem('lang', lang);

    // آپدیت متن‌ها اگر تابع وجود داشته باشد
    // Update UI texts if function exists
    if (typeof updateTexts === 'function') updateTexts(lang);

    // فعال کردن دکمه زبان انتخاب‌شده
    // Toggle active state on selected language button
    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
    });
}


// ------------------------------------------------------------
// فعال کردن دکمه زبان هنگام لود
// Set active language button on load
// ------------------------------------------------------------
function setLanguageButtonActive(lang) {
    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
    });
}


// ------------------------------------------------------------
// ۳. تغییر رنگ اصلی (Accent)
// 3. Change accent color
// ------------------------------------------------------------
function setAccent(color, el) {

    // تغییر مقدار متغیر CSS برای رنگ اصلی
    // Update CSS variable for accent color
    document.documentElement.style.setProperty('--accent-color', color);

    // حذف active از همه دایره‌ها
    // Remove active class from all dots
    document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));

    // فعال کردن دایره انتخاب‌شده
    // Activate selected dot
    el.classList.add('active');

    // ذخیره رنگ انتخاب‌شده
    // Save selected accent color
    localStorage.setItem('accent', color);
}


// ------------------------------------------------------------
// لود زبان و رنگ هنگام شروع
// Load language and accent on initialization
// ------------------------------------------------------------
(function initSettings() {

    // دریافت زبان ذخیره‌شده یا پیش‌فرض انگلیسی
    // Get saved language or default to English
    const savedLang = localStorage.getItem('lang') || 'en';

    // لود فایل زبان سپس اعمال تنظیمات
    // Load language data then apply settings
    loadLanguageData().then(() => {

        // اعمال زبان ذخیره‌شده
        // Apply saved language
        changeLanguage(savedLang);

        // فعال کردن دکمه زبان
        // Set active language button
        setLanguageButtonActive(savedLang);

        // دریافت رنگ ذخیره‌شده
        // Get saved accent color
        const savedAccent = localStorage.getItem('accent');

        // اگر رنگ ذخیره شده بود، اعمال کن
        // Apply saved accent color if exists
        if (savedAccent)
            document.documentElement.style.setProperty('--accent-color', savedAccent);
    });

})();
   </script>
